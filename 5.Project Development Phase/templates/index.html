<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Details - Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen py-10">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <div class="mb-6">
            <a href="/" class="text-sm text-blue-600 hover:underline">&larr; Back to Home</a>
            <h2 class="text-2xl font-bold text-gray-800 mt-2">Applicant Evaluation Form</h2>
            <p class="text-sm text-gray-500">Please provide accurate financial and demographic metrics below.</p>
        </div>

        <form action="/get_prediction" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Age (Years)</label>
                <input type="number" name="age" required min="18" max="100" placeholder="e.g. 30"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Annual Income ($)</label>
                <input type="number" name="income" required min="0" placeholder="e.g. 55000"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Current Debt ($)</label>
                <input type="number" step="any" name="debt" required min="0" placeholder="e.g. 2500"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Credit Score (300 - 850)</label>
                <input type="number" name="credit_score" required min="300" max="850" placeholder="e.g. 720"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                Submit for Evaluation
            </button>
        </form>
    </div>

</body>
</html>
